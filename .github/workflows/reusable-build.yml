name: Reusable Build Workflow

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [16, 18, 20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node with Caching
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'   # 🔥 Enables built-in npm cache

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: |
          mkdir -p dist
          echo "Build successful on Node ${{ matrix.node }}" > dist/output-${{ matrix.node }}.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.node }}
          path: dist/