name: Advanced CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  call-build:
    uses: ./.github/workflows/reusable-build.yml

  test:
    runs-on: ubuntu-latest
    needs: call-build

    strategy:
      matrix:
        node: [16, 18, 20]

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ matrix.node }}
          path: dist/

      - name: Show Artifact
        run: |
          echo "Testing Node ${{ matrix.node }}"
          cat dist/output-${{ matrix.node }}.txt

      - name: Run Tests
        run: echo "Tests Passed on Node ${{ matrix.node }}"

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download Node 18 Artifact (Production Version)
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-18
          path: dist/

      - name: Create Package
        run: tar -czf app.tar.gz dist

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: production-package
          path: app.tar.gz

  deploy-staging:
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging

    steps:
      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: production-package

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          echo "Deployment successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production

    steps:
      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: production-package

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          echo "Production Deployment successful"

  create-release:
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            TAG="v1.0.0"
          fi
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Bump Patch Version
        id: bump
        run: |
          TAG=${{ steps.get_tag.outputs.latest_tag }}
          VERSION=${TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          body: |
            Automated release created by CI/CD pipeline.