name: Advanced CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: |
          mkdir dist
          echo "Build successful" > dist/output.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build   # 👈 depends on build job

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist/

      - name: Show Artifact Content
        run: cat dist/output.txt

      - name: Run Tests
        run: echo "Tests Passed"

  package:
    runs-on: ubuntu-latest
    needs: test   # 👈 depends on test job

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist/

      - name: Create Package
        run: |
          tar -czf app.tar.gz dist

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: production-package
          path: app.tar.gz